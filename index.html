<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Health Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen pb-12 font-sans">

    <header class="bg-gray-800 border-b border-gray-700 p-4 sticky top-0 z-50 shadow-md">
        <div class="max-w-4xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-xl font-bold text-emerald-400">Target 80 Kgs Dashboard</h1>
                <p class="text-xs text-gray-400">Milestone: 89 kg by 39th Birthday (Sept 29, 2026)</p>
            </div>
            <div class="flex items-center gap-3 w-full sm:w-auto justify-end">
                <div class="relative bg-gray-700 border border-gray-600 rounded-lg p-2 text-white flex items-center min-w-[150px]">
                    <span class="text-xs text-gray-400 mr-2 font-bold">DATE:</span>
                    <input type="date" id="logDatePicker" class="bg-transparent text-white text-sm focus:outline-none w-full font-medium appearance-none min-h-[24px]">
                </div>
                <button onclick="exportToExcel()" class="bg-amber-500 hover:bg-amber-600 text-gray-900 font-bold px-3 py-2.5 rounded-lg text-xs tracking-wider uppercase transition inline-block">
                    📥 Excel
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 mt-6 grid grid-cols-1 md:grid-cols-3 gap-6">
        
        <form id="metricsForm" class="md:col-span-2 space-y-6">
            
            <div class="bg-gray-800 p-5 rounded-xl border border-gray-700 space-y-4">
                <h2 class="text-md font-bold text-emerald-400 border-b border-gray-700 pb-2">🥗 Diet & Intake</h2>
                <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                    <div>
                        <label class="block text-xs text-gray-400 mb-1">Water (Liters)</label>
                        <input type="number" id="water_liters" step="0.1" class="w-full bg-gray-900 border border-gray-700 rounded p-2 text-sm text-white">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-400 mb-1">Roti Counter</label>
                        <input type="number" id="roti_count" class="w-full bg-gray-900 border border-gray-700 rounded p-2 text-sm text-white">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-400 mb-1">Bread Slices</label>
                        <input type="number" id="bread_slices" class="w-full bg-gray-900 border border-gray-700 rounded p-2 text-sm text-white">
                    </div>
                </div>
                
                <div class="grid grid-cols-1 gap-3 pt-2 border-t border-gray-700/50">
                    <label class="flex items-center gap-3 p-3 bg-gray-900 rounded-lg text-xs text-gray-300 cursor-pointer hover:bg-gray-750 transition">
                        <input type="checkbox" id="dahi_intake" class="w-4 h-4 rounded text-emerald-500 focus:ring-0">
                        <span>Had Dahi Today Daily Culture/Probiotic</span>
                    </label>
                    <label class="flex items-center gap-3 p-3 bg-emerald-950/30 border border-emerald-900/40 rounded-lg text-xs text-emerald-300 cursor-pointer hover:bg-emerald-950/50 transition">
                        <input type="checkbox" id="protein_checked" class="w-4 h-4 rounded text-emerald-500 focus:ring-0">
                        <span>Anchored meals with clean protein (Eggs/Paneer/Tofu)</span>
                    </label>
                </div>
            </div>

            <div class="bg-gray-800 p-5 rounded-xl border border-gray-700 space-y-4">
                <h2 class="text-md font-bold text-emerald-400 border-b border-gray-700 pb-2">🏃‍♂️ Physical Exercise & Activity</h2>
                <div class="grid grid-cols-2 sm:grid-cols-3 gap-4">
                    <div>
                        <label class="block text-xs text-gray-400 mb-1">Steps Count</label>
                        <input type="number" id="steps_count" class="w-full bg-gray-900 border border-gray-700 rounded p-2 text-sm text-white">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-400 mb-1">Swim Mins</label>
                        <input type="number" id="swim_mins" class="w-full bg-gray-900 border border-gray-700 rounded p-2 text-sm text-white">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-400 mb-1">Plank Seconds</label>
                        <input type="number" id="plank_seconds" class="w-full bg-gray-900 border border-gray-700 rounded p-2 text-sm text-white">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-400 mb-1">Crunches</label>
                        <input type="number" id="crunches_count" class="w-full bg-gray-900 border border-gray-700 rounded p-2 text-sm text-white">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-400 mb-1">Sit Ups</label>
                        <input type="number" id="sit_ups_count" class="w-full bg-gray-900 border border-gray-700 rounded p-2 text-sm text-white">
                    </div>
                </div>
            </div>

            <div class="bg-gray-800 p-5 rounded-xl border border-gray-700 space-y-4">
                <h2 class="text-md font-bold text-emerald-400 border-b border-gray-700 pb-2">🧘‍♂️ Sleep & Mental Well-being</h2>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs text-gray-400 mb-1">Total Night Sleep (Hrs)</label>
                        <input type="number" step="0.1" id="total_night_sleep_hours" class="w-full bg-gray-900 border border-gray-700 rounded p-2 text-sm text-white">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-400 mb-1">Afternoon Nap (Mins)</label>
                        <input type="number" id="afternoon_nap_mins" class="w-full bg-gray-900 border border-gray-700 rounded p-2 text-sm text-white">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-400 mb-1">Pooja / Jal Counter</label>
                        <input type="number" id="pooja_jal_count" class="w-full bg-gray-900 border border-gray-700 rounded p-2 text-sm text-white">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-400 mb-1">Book Reading (Mins)</label>
                        <input type="number" id="book_reading_mins" class="w-full bg-gray-900 border border-gray-700 rounded p-2 text-sm text-white">
                    </div>
                    <div>
                        <label class="block text-xs text-amber-400 mb-1">YouTube / Screen Time (Mins)</label>
                        <input type="number" id="screen_time_mins" class="w-full bg-gray-900 border border-gray-700 rounded p-2 text-sm text-white">
                    </div>
                    <div class="flex items-center pt-4">
                        <label class="flex items-center gap-2 text-xs text-gray-300"><input type="checkbox" id="morning_breathing" class="w-4 h-4"> Morning Pranayam</label>
                    </div>
                </div>
            </div>

            <div class="bg-gray-800 p-5 rounded-xl border border-gray-700 space-y-4">
                <h2 class="text-md font-bold text-emerald-400 border-b border-gray-700 pb-2">⚖️ Weekly Composition</h2>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs text-gray-400 mb-1">Weight (kg)</label>
                        <input type="number" step="0.1" id="weight_kg" placeholder="e.g. 96.2" class="w-full bg-gray-900 border border-gray-700 rounded p-2 text-sm text-white">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-400 mb-1">Body Fat %</label>
                        <input type="number" step="0.1" id="body_fat_percentage" class="w-full bg-gray-900 border border-gray-700 rounded p-2 text-sm text-white">
                    </div>
                </div>
            </div>

            <button type="submit" class="w-full bg-emerald-500 hover:bg-emerald-600 text-gray-900 font-bold py-3 rounded-xl transition shadow-lg text-sm uppercase tracking-wider">
                Save
            </button>
        </form>

        <div class="space-y-6">
            <div class="bg-gray-800 p-4 rounded-xl border border-gray-700 shadow-md text-center">
                <span id="countdown" class="text-xl font-mono text-amber-400 font-bold block">---</span>
                <span class="text-[11px] text-gray-400 block uppercase tracking-wider mt-1">To 39th Birthday Milestone (Target: 89 kg)</span>
            </div>
            <div class="bg-gray-800 p-4 rounded-xl border border-gray-700 shadow-md">
                <h3 class="text-xs font-bold text-gray-400 uppercase tracking-wide mb-3">Weight Progression (Target: 80kg)</h3>
                <canvas id="weightChart"></canvas>
            </div>
            <div class="bg-gray-800 p-4 rounded-xl border border-gray-700 shadow-md">
                <h3 class="text-xs font-bold text-gray-400 uppercase tracking-wide mb-3">Daily Step Trends</h3>
                <canvas id="exerciseChart"></canvas>
            </div>
        </div>
    </main>

    <script>
        // --- PROVIDE YOUR SUPABASE CONFIG HERE ---
        const SUPABASE_URL = "https://uwnhvawonyfoojgzkkyd.supabase.co/rest/v1/";
        const SUPABASE_ANON_KEY = "sb_publishable_gBpYH561QhhJH2J14CGu0g_8y3I2zVw";
        const supabase = Supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const datePicker = document.getElementById('logDatePicker');
        const form = document.getElementById('metricsForm');
        
        const todayStr = new Date().toLocaleDateString('en-CA');
        datePicker.value = todayStr;

        datePicker.addEventListener('change', loadDayData);
        form.addEventListener('submit', saveData);

        let weightChart, exerciseChart;

        async function loadDayData() {
            const selectedDate = datePicker.value;
            let { data, error } = await supabase
                .from('health_dashboard')
                .select('*')
                .eq('log_date', selectedDate)
                .single();

            if (data) {
                const fields = ['water_liters', 'roti_count', 'bread_slices', 'steps_count', 'swim_mins', 'plank_seconds', 'crunches_count', 'sit_ups_count', 'total_night_sleep_hours', 'afternoon_nap_mins', 'pooja_jal_count', 'book_reading_mins', 'screen_time_mins', 'weight_kg', 'body_fat_percentage'];
                fields.forEach(f => {
                    const el = document.getElementById(f);
                    if(el) el.value = data[f] ?? '';
                });
                
                const checks = ['dahi_intake', 'protein_checked', 'morning_breathing'];
                checks.forEach(c => {
                    const el = document.getElementById(c);
                    if(el) el.checked = data[c] ?? false;
                });
            } else {
                form.reset();
                datePicker.value = selectedDate;
            }
        }

        async function saveData(e) {
            e.preventDefault();
            const targetDate = datePicker.value;
            
            const payload = {
                log_date: targetDate,
                water_liters: parseFloat(document.getElementById('water_liters').value) || 0,
                roti_count: parseInt(document.getElementById('roti_count').value) || 0,
                bread_slices: parseInt(document.getElementById('bread_slices').value) || 0,
                steps_count: parseInt(document.getElementById('steps_count').value) || 0,
                swim_mins: parseInt(document.getElementById('swim_mins').value) || 0,
                plank_seconds: parseInt(document.getElementById('plank_seconds').value) || 0,
                crunches_count: parseInt(document.getElementById('crunches_count').value) || 0,
                sit_ups_count: parseInt(document.getElementById('sit_ups_count').value) || 0,
                total_night_sleep_hours: parseFloat(document.getElementById('total_night_sleep_hours').value) || 0,
                afternoon_nap_mins: parseInt(document.getElementById('afternoon_nap_mins').value) || 0,
                pooja_jal_count: parseInt(document.getElementById('pooja_jal_count').value) || 0,
                book_reading_mins: parseInt(document.getElementById('book_reading_mins').value) || 0,
                screen_time_mins: parseInt(document.getElementById('screen_time_mins').value) || 0,
                
                dahi_intake: document.getElementById('dahi_intake').checked,
                protein_checked: document.getElementById('protein_checked').checked,
                morning_breathing: document.getElementById('morning_breathing').checked,
            };

            const w = document.getElementById('weight_kg').value;
            const f = document.getElementById('body_fat_percentage').value;
            if(w) payload.weight_kg = parseFloat(w);
            if(f) payload.body_fat_percentage = parseFloat(f);

            const { error } = await supabase.from('health_dashboard').upsert(payload, { onConflict: 'log_date' });
            
            if (error) {
                alert("Save Error: " + error.message);
            } else {
                alert("✅ Saved safely to cloud database!");
                await renderCharts();
            }
        }

        async function renderCharts() {
            let { data } = await supabase.from('health_dashboard').select('log_date, weight_kg, steps_count').order('log_date', { ascending: true });
            if (!data || data.length === 0) return;

            const dates = data.map(d => {
                const dateObj = new Date(d.log_date);
                return dateObj.toLocaleDateString('en-US', { month: 'short', day: 'numeric', timeZone: 'UTC' });
            });
            
            const weightData = data.map(d => d.weight_kg ? parseFloat(d.weight_kg) : null);
            const stepsData = data.map(d => d.steps_count ? parseInt(d.steps_count) : 0);

            if(weightChart) weightChart.destroy();
            weightChart = new Chart(document.getElementById('weightChart'), {
                type: 'line',
                data: {
                    labels: dates,
                    datasets: [{ 
                        label: 'Weight (kg)', 
                        data: weightData, 
                        borderColor: '#34d399', 
                        backgroundColor: 'rgba(52, 211, 153, 0.1)',
                        borderWidth: 3,
                        tension: 0.3,
                        spanGaps: true,
                        pointRadius: 4
                    }]
                },
                options: { 
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: { y: { grid: { color: '#374151' }, ticks: { color: '#9ca3af' } }, x: { grid: { display: false }, ticks: { color: '#9ca3af' } } } 
                }
            });

            if(exerciseChart) exerciseChart.destroy();
            exerciseChart = new Chart(document.getElementById('exerciseChart'), {
                type: 'bar',
                data: {
                    labels: dates,
                    datasets: [{ label: 'Steps', data: stepsData, backgroundColor: '#38bdf8', borderRadius: 4 }]
                },
                options: { 
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: { y: { grid: { color: '#374151' }, ticks: { color: '#9ca3af' } }, x: { grid: { display: false }, ticks: { color: '#9ca3af' } } } 
                }
            });
        }

        function updateCountdown() {
            const targetDate = new Date('2026-09-29T00:00:00');
            const now = new Date();
            const difference = targetDate - now;
            if (difference > 0) {
                const days = Math.floor(difference / (1000 * 60 * 60 * 24));
                document.getElementById('countdown').innerText = `${days} Days`;
            } else {
                document.getElementById('countdown').innerText = "Milestone Met! 🎂";
            }
        }

        async function exportToExcel() {
            let { data } = await supabase.from
